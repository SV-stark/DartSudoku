name: Build & Release Android App (Nightly)

on:
  schedule:
    - cron: '0 0 * * *'   # Runs every day at 00:00 UTC
  workflow_dispatch:        # Allow manual trigger

permissions:
  contents: write

jobs:
  build-android:
    name: Build and Publish Android APK (Nightly)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Tests
        run: flutter test

      - name: Build Release APK
        run: flutter build apk --release

      - name: Get Current Date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Publish to Nightly Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly Build (${{ steps.date.outputs.date }})"
          prerelease: true
          draft: false
          files: build/app/outputs/flutter-apk/app-release.apk
          body: |
            ## 🌙 DartSudoku — Nightly Android Build

            This is an **automated nightly pre-release** built from the latest `main` branch.

            > ⚠️ This build may be unstable. For stable releases, see the [Releases page](../../releases).

            ### 📲 Installation
            1. Download `app-release.apk` below.
            2. Enable **Install from Unknown Sources** in your Android settings.
            3. Open the downloaded APK to install.

            **Build date**: ${{ steps.date.outputs.date }}
            **Commit**: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
